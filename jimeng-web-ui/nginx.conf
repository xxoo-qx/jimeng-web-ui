# ============================================
# Jimeng Web UI — Nginx 配置
# 功能：托管前端静态文件 + 反向代理 API 请求
# ============================================

server {
    listen 80;
    server_name _;

    # ---------- 静态资源根目录 ----------
    root /usr/share/nginx/html;
    index index.html;

    # ---------- Gzip 压缩 ----------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ---------- API 反向代理 ----------
    # 将 /v1/ 和 /token/ 等 API 请求代理到后端 jimeng-api 服务
    location /v1/ {
        proxy_pass http://jimeng-api:5100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE（Server-Sent Events）支持 — 用于流式聊天
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # 超时设置 — 匹配后端 15 分钟轮询超时
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    # /token/ 路径的 API 代理（积分查询等）
    location /token/ {
        proxy_pass http://jimeng-api:5100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # /ping 健康检查代理
    location = /ping {
        proxy_pass http://jimeng-api:5100;
        proxy_http_version 1.1;
    }

    # ---------- 前端 SPA 路由支持 ----------
    # Vue Router 使用 HTML5 History 模式，所有非文件请求都回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------- 静态资源缓存策略 ----------
    # Vite 构建的静态资源带 hash，可以长期缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # favicon 等根路径静态资源
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
