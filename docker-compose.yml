services:
  # ============================================
  # API 后端服务
  # ============================================
  jimeng-api:
    # 使用 GHCR 上的镜像（生产环境）
    # image: ghcr.io/iptag/jimeng-api:latest
    container_name: jimeng-api
    # 本地开发时可以取消注释下面的 build 配置
    image: jimeng-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # API 不再需要对外暴露端口，由 Nginx 统一代理
    # 如需直接访问 API，可取消注释以下配置
    # ports:
    #   - "5200:5100"
    volumes:
     # 挂载日志目录（确保权限正确）
     - ./logs:/app/logs
     # 挂载临时目录
     - ./tmp:/app/tmp
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5100/ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # Web UI 前端服务（Nginx 托管 + API 反向代理）
  # ============================================
  jimeng-web-ui:
    container_name: jimeng-web-ui
    image: jimeng-web-ui:latest
    build:
      context: ./jimeng-web-ui
      dockerfile: Dockerfile
      args:
        # 访问密码：通过环境变量或 .env 文件设置
        # 示例: ACCESS_PASSWORD=mypassword docker compose up -d --build
        VITE_ACCESS_PASSWORD: ${ACCESS_PASSWORD:-}
    restart: unless-stopped
    ports:
      # 统一入口端口：访问 http://localhost:5200 即可使用 Web UI + API
      - "5200:80"
    depends_on:
      jimeng-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"